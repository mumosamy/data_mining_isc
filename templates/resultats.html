<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résultat de la segmentation</title>
    <link  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css", rel="stylesheet"></link>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-conent-center">
            <div class="col-md-7">
                <div class="card shadow-lg">
                    <div class=" card-header bg-primary text-white text-center">
                        <h4 class="mb-0">RESULTAT DE LA SEGMENTATION</h4>
                    </div>
                    <div class="card-body">
                        <h5 class="card-title mb-3">DONNEES SAISIES</h5>
                        <ul class="list-group mb-4">
                            <li class="list-group-item"> <strong>Age :</strong>{{age}}</li>
                            <li class="list-group-item"> <strong>Révenu Annuel :</strong>{{revenu}}K$</li>
                            <li class="list-group-item"> <strong>Dépense Annuelle :</strong>{{depense}}</li>
                        </ul>
                        <div class="alert alert-success text-center">
                            <h5 class="mb-2">
                                Cluster attribué : <strong>{{ cluster }}</strong>
                                <p class="mb-0"> <strong>Profil métier</strong>{{ profil }}</p>
                            </h5>
                        </div>
                    </div>
                    <div class="card-footer text-center bg-white">
                        <a href="/" class="btn btn-outline-primary">Nouvelle Analyse</a>
                    </div>
                </div>
            </div>
        </div>
    </div>    
</body>
</html>
