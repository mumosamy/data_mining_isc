<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segmentation des Clients</title>
    <link  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css", rel="stylesheet"></link>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="col md-6">
            <div class="card show-lg">
                <div class="card-body">
                    <h3 class="card-title text-center mb-5"> Segmentation Client</h3>
                    <small class="text-muted"> Data Mining Non Supervisé</small>
                    <form method="POST" action="/prediction">
                        <div class="form-label">Age</div>
                        <input type="number" name="age" class="form-control" placeholder="Exemple 30 ans" required>
                        <div class="form-label">Revenu</div>
                        <input type="number" name="revenu" class="form-control" placeholder=" Exemple 60 mille dollars" required>
                        <div class="form-label">Dépense</div>
                        <input type="number" name="depense" class="form-control" placeholder="Exemple 40 mille dollars" required> en milles (k$)
                        <div class="d-grid">
                            <button type="submit" class="btn-primary btn-lg">Analyser</button>
                        </div>
                    </form>
                </div>
            </div>
            <p class="text-center mt-3 text-muted"> Projet de segmentation - Data Mining descriptif </p>
        </div>

    </div>
    
</body>
</html>
